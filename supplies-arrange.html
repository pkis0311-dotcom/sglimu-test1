<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도서정리 용품 - SG LIMU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .category-page { padding: 80px 0 100px; min-height: 800px; }
        .category-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }
        .category-header { text-align: center; margin-bottom: 60px; padding: 100px 5% 60px; background-color: var(--color-surface); border-radius: 20px; }
        .category-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 20px; }
        .subcategory-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .subcategory-item { padding: 12px 30px; font-weight: 600; color: var(--color-text-light); background: #fff; border: 1px solid var(--color-border); border-radius: 30px; cursor: pointer; }
        .subcategory-item.active { color: #fff; background: var(--color-primary); border-color: var(--color-primary); }
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #999; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo"><a href="index.html">SG LIMU</a></h1>
            <nav class="gnb">
                <ul>
                    <li><a href="rfid.html">RFID시스템</a></li>
                    <li><a href="em.html">EM시스템</a></li>
                    <li><a href="access.html">출입관리시스템</a></li>
                    <li><a href="supplies-arrange.html">도서정리 용품</a></li>
                    <li><a href="supplies-protect.html">도서보호, 보수용품</a></li>
                    <li><a href="supplies-lend.html">대출용품</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="category-page">
        <div class="category-header">
            <h2 class="category-title">도서정리 용품</h2>
            <p>제품 정보를 불러오고 있습니다...</p>
        </div>
        <div class="category-container">
            <ul class="subcategory-nav" id="subCategoryNav">
                <li class="subcategory-item active" data-target="supplies_arrange_keeper">키퍼</li>
                <li class="subcategory-item" data-target="supplies_arrange_label_color">색띠라벨</li>
                <li class="subcategory-item" data-target="supplies_arrange_label_paper">라벨용지</li>
                <li class="subcategory-item" data-target="supplies_arrange_bookend">북앤드</li>
            </ul>
            <div class="product-list" id="productList">
                <div class="empty-state">로딩 중...</div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase;
        const SUPABASE_URL = 'https://xxvfgnoffomrhtxitqkj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q4t2p9WcUBdtUxd7HYV56A_MvxnZRk9';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadProducts(catId) {
            const container = document.getElementById('productList');
            container.innerHTML = '<div class="empty-state">로딩 중...</div>';
            const { data, error } = await supabaseClient.from('products').select('*').eq('category', catId);
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">해당 카테고리에 상품이 없습니다.</div>';
                return;
            }
            container.innerHTML = '';
            data.forEach(p => {
                const card = document.createElement('div');
                card.style.cssText = "background:#fff; border-radius:15px; border:1px solid #eee; overflow:hidden;";
                card.innerHTML = <a href="product-detail.html?id=\" style="text-decoration:none; color:inherit;">
                    <div style="height:250px; background:url('\') center/contain no-repeat #f9f9f9; border-bottom:1px solid #eee;"></div>
                    <div style="padding:20px;">
                        <h4 style="margin-bottom:10px; font-weight:600;">\</h4>
                        <p style="font-weight:700; color:#3498db;">\</p>
                    </div>
                </a>;
                container.appendChild(card);
            });
        }
        document.querySelectorAll('.subcategory-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.subcategory-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                loadProducts(item.dataset.target);
            });
        });
        loadProducts('supplies_arrange_keeper');
    </script>
</body>
</html>
