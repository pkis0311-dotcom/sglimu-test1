<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>퍼시스 가구 - SG LIMU</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header"><div class="header-container"><h1 class="logo"><a href="index.html">SG LIMU</a></h1></div></header>
    <main class="category-page">
        <div class="category-header"><h2>퍼시스 가구</h2><p>퍼시스의 스마트한 도서관 오피스 솔루션입니다.</p></div>
        <div class="category-container">
            <ul class="subcategory-nav"><li class="subcategory-item active" data-target="fursys_shelf">서가</li></ul>
            <div class="product-list" id="productList"><div class="empty-state">로딩 중...</div></div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase;
        const SUPABASE_URL = 'https://xxvfgnoffomrhtxitqkj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q4t2p9WcUBdtUxd7HYV56A_MvxnZRk9';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function loadProducts(catId) {
            const container = document.getElementById('productList');
            container.innerHTML = '<div class="empty-state">로딩 중...</div>';
            const { data, error } = await supabaseClient.from('products').select('*').eq('category', catId);
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div class="empty-state">해당 카테고리에 상품이 없습니다.</div>';
                return;
            }
            container.innerHTML = '';
            data.forEach(p => {
                const card = document.createElement('div');
                card.style.cssText = "background:#fff; border-radius:15px; border:1px solid #eee; overflow:hidden; margin-bottom:20px;";
                card.innerHTML = <a href="product-detail.html?id=\" style="text-decoration:none; color:inherit;">
                    <div style="height:250px; background:url('\') center/contain no-repeat #f9f9f9; border-bottom:1px solid #eee;"></div>
                    <div style="padding:20px;">
                        <h4 style="margin-bottom:10px;">\</h4>
                        <p style="font-weight:700; color:#3498db;">\</p>
                    </div>
                </a>;
                container.appendChild(card);
            });
        }
        document.querySelectorAll('.subcategory-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.subcategory-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                loadProducts(item.dataset.target);
            });
        });
        loadProducts('fursys_shelf');
    </script>
</body>
</html>
