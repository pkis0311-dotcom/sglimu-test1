<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 - 에스지라이뮤</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="inquiry.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .category-page { padding: 80px 0 100px; min-height: 800px; }
        .category-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }
        .category-header { text-align: center; margin-bottom: 60px; padding: 100px 5% 60px; background-color: var(--color-surface); border-radius: 20px; }
        .category-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 20px; }
        .subcategory-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .subcategory-item { padding: 12px 30px; font-weight: 600; color: var(--color-text-light); background: #fff; border: 1px solid var(--color-border); border-radius: 30px; cursor: pointer; transition: var(--transition-smooth); }
        .subcategory-item.active { color: #fff; background: var(--color-primary); border-color: var(--color-primary); }
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 100px 0; color: #999; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo"><a href="index.html">SG LIMU</a></h1>
            <nav class="gnb">
                <ul id="gnbList">
                    <!-- Dynamic GNB will be injected here -->
                </ul>
            </nav>
            <div class="header-utils">
                <div class="search-wrapper">
                    <input type="text" class="search-input" placeholder="검색어를 입력하세요">
                    <a href="#" class="search-btn" id="headerSearchBtn"><i class="fa-solid fa-magnifying-glass"></i></a>
                </div>
                <div class="user-auth-wrap" id="userAuthWrap">
                    <button class="login-trigger-btn" id="loginTriggerBtn">
                        <i class="fa-regular fa-user"></i>
                        <span>로그인</span>
                    </button>
                </div>
                <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>
    </header>

    <main class="category-page">
        <div class="category-header" id="categoryHeader">
            <h2 class="category-title" id="pageTitle">로딩 중...</h2>
            <p id="pageDesc">데이터를 불러오고 있습니다.</p>
        </div>
        <div class="category-container">
            <ul class="subcategory-nav" id="subCategoryNav">
                <!-- Sub categories will be injected here -->
            </ul>
            <div class="product-list" id="productList"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-info">
                <p><strong>(주)에스지라이뮤</strong> | Tel : 1544-5703 | 팩스 : 051-518-5985 | E-Mail : limu101@nate.com</p>
                <p>Address : 부산광역시 금정구 중앙대로 2210번길 29-1 (두구동)</p>
                <p>대표자명 : 강인태 | 사업자번호 : 621-81-42086 | 통신판매업신고번호 : 제 2018-부산금정-0045호</p>
                <p class="copyright">Copyright © 2023 SG LIMU. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="cart.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if(!code) return;

            // 1. Fetch current category details
            const { data: category, error: catErr } = await supabaseClient
                .from('categories')
                .select('*')
                .eq('id', code)
                .single();

            if(catErr || !category) {
                console.error("Category load error:", catErr);
                document.getElementById('pageTitle').innerText = "카테고리를 찾을 수 없습니다";
                document.getElementById('pageDesc').innerText = "DB에 데이터가 없거나 잘못된 접근입니다. 관리자 페이지에서 '초기 데이터 이전'을 완료해 주세요.";
                return;
            }

            document.getElementById('pageTitle').innerText = category.name;
            document.getElementById('pageDesc').innerText = category.description || '';
            document.title = `${category.name} - 에스지라이뮤`;

            // 2. Fetch sibling categories or subcategories
            let majorId = category.is_major ? category.id : category.parent_id;
            const { data: subs } = await supabaseClient
                .from('categories')
                .select('*')
                .eq('parent_id', majorId)
                .order('display_order', { ascending: true });

            const nav = document.getElementById('subCategoryNav');
            if(subs && subs.length > 0) {
                nav.innerHTML = subs.map(s => `
                    <li class="subcategory-item ${s.id === code ? 'active' : ''}" 
                        onclick="location.href='category.html?code=${s.id}'">
                        ${s.name}
                    </li>
                `).join('');
                
                // If it's a major category, load products for the first sub-category by default
                // or if it's a minor category, load its products.
                if(category.is_major) {
                    window.loadGlobalProducts(subs[0].id);
                    // Update active state for the first sub
                    nav.querySelectorAll('.subcategory-item')[0].classList.add('active');
                } else {
                    window.loadGlobalProducts(category.id);
                }
            } else {
                // No subcategories, just load current
                window.loadGlobalProducts(category.id);
            }
        });
    </script>
</body>
</html>
