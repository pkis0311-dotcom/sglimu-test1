<!DOCTYPE html>
<html>
<head>
    <title>DB Check</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Connection & Data Check</h1>
    <div id="status">Checking...</div>
    <pre id="output"></pre>
    <script>
        const SUPABASE_URL = 'https://xxvfgnoffomrhtxitqkj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q4t2p9WcUBdtUxd7HYV56A_MvxnZRk9';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkData() {
            const out = document.getElementById('output');
            const stat = document.getElementById('status');
            
            try {
                stat.innerText = "Fetching unique categories...";
                const { data: categories, error: cErr } = await client.from('products').select('category');
                const uniqueCats = [...new Set(categories.map(it => it.category))];
                out.innerText += "--- Unique Categories in DB ---\n" + JSON.stringify(uniqueCats, null, 2) + "\n\n";

                stat.innerText = "Fetching top 10 products...";
                const { data: products, error: pErr } = await client.from('products').select('*').limit(10);
                out.innerText += "--- Products (Top 10) ---\n" + JSON.stringify(products || pErr, null, 2) + "\n\n";
                
                stat.innerText = "Done.";
            } catch (e) {
                stat.innerText = "Error: " + e.message;
            }
        }
        checkData();
    </script>
</body>
</html>
