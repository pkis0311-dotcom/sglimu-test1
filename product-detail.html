<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제품 상세 - 에스지라이뮤</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="inquiry.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-page { padding: 120px 5% 100px; max-width: 1400px; margin: 0 auto; }
        .product-main { display: flex; gap: 50px; margin-bottom: 80px; }
        .product-gallery { flex: 1; }
        .main-img { width: 100%; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; }
        .product-info-panel { flex: 1; display: flex; flex-direction: column; }
        .product-tag { color: var(--color-primary); font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .product-title { font-size: 2.2rem; color: #222; font-weight: 700; margin-bottom: 20px; }
        .product-price { font-size: 1.8rem; color: var(--color-primary); font-weight: 700; border-bottom: 1px solid #eee; padding-bottom: 25px; margin-bottom: 30px; }
        .option-row { margin-bottom: 20px; }
        .option-label { font-size: 0.95rem; font-weight: 600; margin-bottom: 10px; display: block; }
        .option-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .option-item { padding: 8px 20px; border: 1px solid var(--color-border); border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .option-item.active { border-color: var(--color-primary); color: var(--color-primary); background: #f0f7ff; }
        .buy-btns { display: flex; gap: 15px; margin-top: 40px; }
        .btn-cart { flex: 1; height: 60px; font-size: 1.1rem; font-weight: 600; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .btn-order { flex: 2; height: 60px; font-size: 1.1rem; font-weight: 600; background: #222; color: #fff; border: none; cursor: pointer; }
        
        .detail-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 50px; }
        .tab-item { padding: 15px 40px; font-size: 1.1rem; font-weight: 600; color: #999; cursor: pointer; position: relative; }
        .tab-item.active { color: #222; }
        .tab-item.active::after { content:''; position:absolute; bottom:-2px; left:0; width:100%; height:2px; background:#222; }
        .detail-contents { text-align: center; }
        .detail-contents img { max-width: 100%; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1 class="logo"><a href="index.html">SG LIMU</a></h1>
            <nav class="gnb">
                <ul>
                    <li><a href="#">도서관리 시스템</a>
                        <ul class="submenu">
                            <li><a href="rfid.html">RFID시스템</a></li>
                            <li><a href="em.html">EM시스템</a></li>
                            <li><a href="access.html">출입관리시스템</a></li>
                        </ul>
                    </li>
                    <li><a href="#">도서관 용품</a>
                        <ul class="submenu">
                            <li><a href="supplies-arrange.html">도서정리 용품</a></li>
                            <li><a href="supplies-protect.html">도서보호용품</a></li>
                            <li><a href="supplies-lend.html">대출용품</a></li>
                            <li><a href="sterilizer.html">책소독기</a></li>
                        </ul>
                    </li>
                    <li><a href="#">도서관 가구</a>
                        <ul class="submenu">
                            <li><a href="furniture-koas.html">코아스</a></li>
                            <li><a href="furniture-fomus.html">포머스</a></li>
                            <li><a href="furniture-fursys.html">퍼시스</a></li>
                            <li><a href="furniture-custom.html">제작가구</a></li>
                        </ul>
                    </li>
                    <li><a href="discount.html">할인상품</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="detail-page">
        <div class="product-main">
            <div class="product-gallery">
                <img id="mainImg" class="main-img" src="assets/no-image.png">
            </div>
            <div class="product-info-panel">
                <span class="product-tag" id="prodCategory">Category</span>
                <h2 class="product-title" id="prodTitle">제품명</h2>
                <div class="product-price" id="prodPrice">가격문의</div>
                
                <div class="option-row" id="optionColorRow" style="display:none;">
                    <span class="option-label">색상 선택</span>
                    <div class="option-list" id="colorList"></div>
                </div>
                
                <div class="option-row" id="optionSizeRow" style="display:none;">
                    <span class="option-label">사이즈 선택</span>
                    <div class="option-list" id="sizeList"></div>
                </div>

                <div class="buy-btns">
                    <button class="btn-cart" id="addToCartBtn">장바구니</button>
                    <button class="btn-order" id="directOrderBtn">전적문의 / 상담신청</button>
                </div>
            </div>
        </div>

        <div class="detail-tabs">
            <div class="tab-item active">제품 상세설명</div>
            <div class="tab-item">배송/교환/반품</div>
        </div>

        <div class="detail-contents" id="detailBody">
            <!-- Dynamic content -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = supabase;
        const db = createClient('https://xxvfgnoffomrhtxitqkj.supabase.co', 'sb_publishable_Q4t2p9WcUBdtUxd7HYV56A_MvxnZRk9');
        
        async function loadProductDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) return;

            const { data: p } = await db.from('products').select('*').eq('id', id).single();
            if(!p) return;

            document.getElementById('prodTitle').innerText = p.name;
            document.getElementById('prodPrice').innerText = (p.price === '전화문의' || !p.price) ? '전화문의' : Number(p.price).toLocaleString() + '원';
            document.getElementById('mainImg').src = p.image_url || 'assets/no-image.png';

            // Load Page Data for deep details
            const { data: config } = await db.from('site_configs').select('value').eq('key', 'pageData_' + id).single();
            const detailBody = document.getElementById('detailBody');
            
            if(config && config.value) {
                const d = config.value;
                if(d.detailImage) detailBody.innerHTML = `<img src="${d.detailImage}">`;
                else if(d.description) detailBody.innerHTML = `<p style="padding:50px;">${d.description.replace(/\n/g, '<br>')}</p>`;
            } else {
                detailBody.innerHTML = `<p style="padding:50px; color:#999;">등록된 상세 설명이 없습니다.</p>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadProductDetail);
    </script>
    <script src="script.js"></script>
    <script src="cart.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
