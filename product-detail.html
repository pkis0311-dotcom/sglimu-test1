    <script>
        // Product Detail Page Specific JS
        const basePrice = 235000;

        function changeImage(src, element) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function updateQty(change) {
            const input = document.getElementById('qtyInput');
            let current = parseInt(input.value);
            let newVal = current + change;
            if (newVal < 1) newVal = 1;
            input.value = newVal;
            
            // [媛쒖꽑] ?듭뀡 異붽? 湲덉븸 ?숈쟻 怨꾩궛
            let optPrice = 0;
            
            // 1. ?됱긽 ?듭뀡 (湲곗〈 ?섎뱶肄붾뵫 ?좎?)
            const colorSelect = document.getElementById('colorOption');
            if(colorSelect && colorSelect.value === '?붾꽋') optPrice += 15000;

            // 2. ?ъ씠利??듭뀡 (?숈쟻 異붽? 湲덉븸 ?⑹궛)
            const sizeSelect = document.getElementById('sizeOption');
            if(sizeSelect && sizeSelect.value) {
                const parts = sizeSelect.value.split('|');
                optPrice += parseInt(parts[0]) || 0;
            }
            
            const total = (window.basePrice + optPrice) * newVal;
            document.getElementById('totalPrice').innerText = total.toLocaleString();
        }

        document.getElementById('colorOption')?.addEventListener('change', () => updateQty(0));
        document.getElementById('sizeOption')?.addEventListener('change', () => updateQty(0));

        function switchTab(index, element) {
            document.querySelectorAll('.detail-tab-btn').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.detail-tab-content').forEach(el => el.classList.remove('active'));
            
            element.classList.add('active');
            document.getElementById('tab' + index).classList.add('active');
        }
    </script>

                // ?곸꽭?섏씠吏 ?몃줈???듭씠誘몄? (?ㅼ쨷 ?대?吏 ???
                if(data.detailImages || data.detailImage) {
                    const detailImgElem = document.getElementById('dynamicDetailImg');
                    if(detailImgElem) {
                        const container = detailImgElem.parentElement;
                        container.innerHTML = ''; // 湲곗〈 ?대?吏 ?쒓굅
                        const imgs = data.detailImages || [data.detailImage];
                        imgs.forEach(src => {
                            if(!src) return;
                            const img = document.createElement('img');
                            img.src = src;
                            img.style.cssText = "max-width:100%; display:block; margin: 0 auto 10px auto;";
                            container.appendChild(img);
                        });
                    }
                }
                
                // ?쒗뭹 ?ъ뼇 (DIMENSION) ?뚯씠釉?                if(data.specs && data.specs.length > 0) {
                    const specBody = document.getElementById('dynamicSpecTable');
                    if(specBody) {
                        specBody.innerHTML = '';
                        data.specs.forEach(s => {
                            specBody.innerHTML += `<tr><th style="background:#f9f9f9; padding:12px; border-bottom:1px solid #ddd; text-align:left; width:25%;">${s.key}</th><td style="padding:12px; border-bottom:1px solid #ddd;">${s.val}</td></tr>`;
                        });
                    }
                }
                
                // ?쒗뭹 ?뱀쭠 (DETAIL VIEW) 由ъ뒪??                if(data.features && data.features.length > 0) {
                    const featureContainer = document.getElementById('dynamicFeatures');
                    if(featureContainer) {
                        featureContainer.innerHTML = '';
                        data.features.forEach((feat, i) => {
                            const isLast = (i === data.features.length - 1) ? 'style="border-bottom: none;"' : '';
                            const num = (i + 1).toString().padStart(2, '0');
                            featureContainer.innerHTML += `
                                <div class="feature-item" ${isLast}>
                                    <h5 style="font-size:1.1rem; color:#222; margin-bottom:10px; display:flex; align-items:center;">
                                        <span style="display:inline-block; background:#8ec342; color:#fff; width:24px; height:24px; line-height:24px; text-align:center; border-radius:50%; margin-right:10px; font-size:0.8rem;">${num}</span>
                                        ${feat.title}
                                    </h5>
                                    <p style="color:#666; line-height:1.6; padding-left:34px;">${feat.desc.replace(/\n/g, '<br>')}</p>
                                </div>
                            `;
                        });
                    }
                }
            }
        }

        window.addEventListener('DOMContentLoaded', initProductDetail);
    </script>
